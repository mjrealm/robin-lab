---
traefik:
  service:
    type: LoadBalancer
  ports:
    web:
      port: 80
      expose: true
      exposedPort: 80
    websecure:
      port: 443
      expose: true
      exposedPort: 443
  ingressRoute:
    dashboard:
      enabled: true
  providers:
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: true
    kubernetesGateway:
      enabled: false
