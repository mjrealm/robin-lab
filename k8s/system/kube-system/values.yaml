---
cilium:
  operator:
    replicas: 1

  kubeProxyReplacement: true
  k8sServiceHost: 127.0.0.1
  k8sServicePort: 7445

  # Enable L2 mode announcements
  l2announcements:
    enabled: true

  # Enable ingress controller
  ingressController:
    enabled: false
    default: true
    loadbalancerMode: shared
    service:
      allocateLoadBalancerNodePorts: false

  # Important for L2 mode
  k8sClientRateLimit:
    qps: 40
    burst: 60

  # Hubble UI
  hubble:
    relay:
      enabled: true
    ui:
      enabled: true

loadBalancerIPPools:
  - 192.168.29.100/30  # Covers .100, .101, .102, and .103
  - 192.168.29.104/31  # Covers .104 and .105
