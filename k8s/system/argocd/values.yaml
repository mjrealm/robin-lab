---
argo-cd:
  global:
    domain: &host argo.apollo.mdeleon.dev

  server:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    ingress:
      enabled: true
      hostname: *host
      tls: false
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: Argo CD
        gethomepage.dev/description: Declarative GitOps CD for Kubernetes
        gethomepage.dev/group: System
        gethomepage.dev/icon: sh-argo-cd.png
      extraTls:
        - hosts:
            - *host
          secretName: argocd-tls-cert

  notifications:
    enabled: false
  dex:
    enabled: false
    metrics:
      enabled: false
      serviceMonitor:
        enabled: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  # Helm Secrets
  configs:
    params:
      server.insecure: true
    cm:
      helm.valuesFileSchemes: >-
        secrets+gpg-import, secrets+gpg-import-kubernetes,
        secrets+age-import, secrets+age-import-kubernetes,
        secrets,secrets+literal,
        https

  repoServer:
    env:
      - name: HELM_PLUGINS
        value: /custom-tools/helm-plugins/
      - name: HELM_SECRETS_CURL_PATH
        value: /custom-tools/curl
      - name: HELM_SECRETS_SOPS_PATH
        value: /custom-tools/sops
      - name: HELM_SECRETS_VALS_PATH
        value: /custom-tools/vals
      - name: HELM_SECRETS_KUBECTL_PATH
        value: /custom-tools/kubectl
      - name: HELM_SECRETS_BACKEND
        value: sops
      # https://github.com/jkroepke/helm-secrets/wiki/Security-in-shared-environments
      - name: HELM_SECRETS_VALUES_ALLOW_SYMLINKS
        value: "false"
      - name: HELM_SECRETS_VALUES_ALLOW_ABSOLUTE_PATH
        value: "true"
      - name: HELM_SECRETS_VALUES_ALLOW_PATH_TRAVERSAL
        value: "false"
      - name: HELM_SECRETS_WRAPPER_ENABLED
        value: "true"
      - name: HELM_SECRETS_DECRYPT_SECRETS_IN_TMP_DIR
        value: "true"
      - name: HELM_SECRETS_HELM_PATH
        value: /usr/local/bin/helm
      # Age key
      - name: SOPS_AGE_KEY_FILE
        value: /helm-secrets-private-keys/key.txt
      - name: HELM_SECRETS_IGNORE_MISSING_VALUES
        value: "true"
    volumes:
      - name: custom-tools
        emptyDir: {}
      - name: helm-secrets-private-keys
        secret:
          secretName: helm-secrets-private-keys
    volumeMounts:
      - mountPath: /custom-tools
        name: custom-tools
      - mountPath: /usr/local/sbin/helm
        subPath: helm
        name: custom-tools
      - mountPath: /helm-secrets-private-keys/
        name: helm-secrets-private-keys
    initContainers:
      - name: download-tools
        image: alpine:latest
        imagePullPolicy: IfNotPresent
        command: [sh, -ec]
        env:
          - name: HELM_SECRETS_VERSION  # https://github.com/jkroepke/helm-secrets/releases
            value: "4.7.7"
          - name: KUBECTL_VERSION  # https://github.com/kubernetes/kubernetes/releases
            value: "1.36.2"
          - name: VALS_VERSION  # https://github.com/helmfile/vals/releases
            value: "0.44.3"
          - name: SOPS_VERSION  # https://github.com/getsops/sops/releases
            value: "3.13.2"
        args:
          - |
            ARCH=$(uname -m)
            case "${ARCH}" in
              x86_64)
                CURL_ARCH="amd64"
                SOPS_ARCH="amd64"
                KUBE_ARCH="amd64"
                VALS_ARCH="amd64"
                ;;
              aarch64)
                CURL_ARCH="aarch64"
                SOPS_ARCH="arm64"
                KUBE_ARCH="arm64"
                VALS_ARCH="arm64"
                ;;
              *)
                echo "Unsupported architecture: ${ARCH}"
                exit 1
                ;;
            esac

            mkdir -p /custom-tools/helm-plugins

            echo "Install helm secrets - ${HELM_SECRETS_VERSION}"
            wget -qO- https://github.com/jkroepke/helm-secrets/releases/download/v${HELM_SECRETS_VERSION}/helm-secrets.tar.gz | tar -C /custom-tools/helm-plugins -xzf-;

            echo "Install static curl - latest (${CURL_ARCH})"
            wget -qO /custom-tools/curl "https://github.com/moparisthebest/static-curl/releases/latest/download/curl-${CURL_ARCH}"

            echo "Install sops - ${SOPS_VERSION} (${SOPS_ARCH})"
            wget -qO /custom-tools/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.${SOPS_ARCH}"

            echo "Install kubectl - ${KUBECTL_VERSION} (${KUBE_ARCH})"
            wget -qO /custom-tools/kubectl "https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/${KUBE_ARCH}/kubectl"

            echo "Install vals - ${VALS_VERSION} (${VALS_ARCH})"
            wget -qO- "https://github.com/helmfile/vals/releases/download/v${VALS_VERSION}/vals_${VALS_VERSION}_linux_${VALS_ARCH}.tar.gz" | tar -xzf- -C /custom-tools/ vals;

            cp /custom-tools/helm-plugins/helm-secrets/scripts/wrapper/helm.sh /custom-tools/helm

            chmod +x /custom-tools/*
        volumeMounts:
          - mountPath: /custom-tools
            name: custom-tools
