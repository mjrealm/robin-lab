---
longhorn:
  global:
    tolerations:
      - key: "node-role.kubernetes.io/master"
        value: "true"
        effect: "NoSchedule"
        operator: "Equal"
  persistence:
    defaultClassReplicaCount: 2
  preUpgradeChecker:
    jobEnabled: false
  defaultSettings:
    taintToleration: node-role.kubernetes.io/master=true:NoSchedule
  defaultBackupStore:
    backupTarget: nfs://192.168.26.10:/volume1/backups/longhorn
  ingress:
    enabled: true
    host: longhorn.apollo.mdeleon.dev
    tls: true
    tlsSecret: longhorn-tls-cert
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Longhorn
      gethomepage.dev/description: Block Storage
      gethomepage.dev/group: System
      gethomepage.dev/icon: sh-longhorn.png
      gethomepage.dev/pod-selector: ""
  metrics:
    serviceMonitor:
      enabled: true
